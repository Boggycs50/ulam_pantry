<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner | UlamFinder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --mint: #5bc9b1; --pink: #f4a2b9; --dark: #3d1c1c; }
        body { font-family: sans-serif; background: #000; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        .back-btn { position: absolute; top: 20px; left: 20px; color: white; text-decoration: none; z-index: 100; font-weight: bold; }
        
        .scanner-frame { position: relative; width: 85%; max-width: 350px; aspect-ratio: 3/4; border-radius: 40px; overflow: hidden; border: 4px solid white; box-shadow: 0 0 50px rgba(91, 201, 177, 0.4); }
        video { width: 100%; height: 100%; object-fit: cover; }

        .laser { position: absolute; top: 0; width: 100%; height: 4px; background: var(--mint); box-shadow: 0 0 20px var(--mint); animation: scan 2s infinite; }
        @keyframes scan { 0% { top: 0% } 50% { top: 100% } 100% { top: 0% } }

        .ui { margin-top: 30px; text-align: center; }
        .scan-btn { background: var(--mint); border: none; padding: 15px 40px; border-radius: 50px; color: white; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fa-solid fa-chevron-left"></i> Home</a>

    <div class="scanner-frame">
        <div class="laser"></div>
        <video id="camera" autoplay playsinline></video>
    </div>

    <div class="ui">
        <h2>Pantry <span>Scanner</span></h2>
        <p style="opacity: 0.6;">Point at an ingredient to identify it</p>
        <button class="scan-btn">CAPTURE</button>
    </div>

    <script>
        navigator.mediaDevices.getUserMedia({video:{facingMode: "environment"}})
        .then(stream=>{ document.getElementById("camera").srcObject=stream })
    </script>
</body>
</html>
