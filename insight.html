<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spending | UlamFinder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --mint: #5bc9b1; --pink: #f4a2b9; --dark: #3d1c1c; --bg: #fff9f9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--dark); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        
        .stat-card { background: linear-gradient(135deg, var(--mint), #4eb09b); color: white; padding: 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 350px; box-shadow: 0 15px 30px rgba(91, 201, 177, 0.3); margin-bottom: 30px; }
        .stat-card small { opacity: 0.8; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }
        .stat-card h2 { font-size: 3rem; margin: 10px 0; }

        .input-box { background: white; padding: 30px; border-radius: 24px; width: 100%; max-width: 350px; display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #f0f0f0; outline: none; }
        .add-btn { background: var(--dark); color: white; border: none; padding: 15px 25px; border-radius: 12px; font-weight: bold; }
        
        .home-btn { margin-top: 30px; text-decoration: none; color: var(--mint); font-weight: bold; }
    </style>
</head>
<body>
    <div class="stat-card">
        <small>Current Monthly Spending</small>
        <h2 id="total">₱0</h2>
        <i class="fa-solid fa-chart-line"></i>
    </div>

    <div class="input-box">
        <input type="number" id="amount" placeholder="0.00">
        <button class="add-btn" onclick="addCost()">ADD</button>
    </div>

    <a href="index.html" class="home-btn"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>

    <script>
        let costs=JSON.parse(localStorage.getItem("costs")) || []
        function addCost(){
            let amt=Number(document.getElementById("amount").value)
            if(amt > 0){ costs.push(amt); localStorage.setItem("costs",JSON.stringify(costs)); update(); document.getElementById("amount").value=""; }
        }
        function update(){
            let total=costs.reduce((a,b)=>a+b,0)
            document.getElementById("total").innerText="₱" + total.toLocaleString()
        }
        update()
    </script>
</body>
</html>
