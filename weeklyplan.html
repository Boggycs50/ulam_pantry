<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Plan | UlamFinder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="photo-header" style="background-image: url('https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=1600&auto=format&fit=crop');">
        <a href="index.html" class="btn-glass"><i class="fa-solid fa-arrow-left"></i> Exit Planner</a>
    </header>

    <div class="container" style="max-width: 1000px; margin: 0 auto; z-index: 10; position: relative;">
        <h1 style="font-family: 'Playfair Display'; font-size: 3rem; text-align: center;">Weekly <span>Plan</span></h1>
        
        <div style="display: flex; gap: 10px; overflow-x: auto; padding: 20px 0;">
            <div class="premium-card" style="min-width: 150px; text-align: center;"><strong>MON</strong><p>Beef Tapa</p></div>
            <div class="premium-card" style="min-width: 150px; text-align: center; border-color: var(--mint-brand);"><strong>TUE</strong><p>Sinigang</p></div>
            <div class="premium-card" style="min-width: 150px; text-align: center;"><strong>WED</strong><p>Adobo</p></div>
            <div class="premium-card" style="min-width: 150px; text-align: center;"><strong>THU</strong><p>Pasta</p></div>
            <div class="premium-card" style="min-width: 150px; text-align: center; border-color: var(--pink-brand);"><strong>FRI</strong><p>Fish</p></div>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
