<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meal Plan | UlamFinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <header class="subpage-header">
        <a href="index.html" class="back-link"><i class="fa-solid fa-house"></i> Dashboard</a>
    </header>

    <div class="container" style="max-width: 800px;">
        <div style="background: white; padding: 40px; border-radius: 40px; border-left: 8px solid var(--mint-brand);" data-aos="fade-up">
            <h1 style="font-family: 'Playfair Display'; margin: 0;">Today's <span>Progress</span></h1>
            <p>Friday, March 13, 2026</p>
            
            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <div style="flex: 1; text-align: center; padding: 15px; background: var(--bg-light); border-radius: 20px;">
                    <h2 style="color: var(--pink-brand); margin: 0;">1,450</h2>
                    <small>CALORIES EATEN</small>
                </div>
                <div style="flex: 1; text-align: center; padding: 15px; background: var(--bg-light); border-radius: 20px;">
                    <h2 style="color: var(--mint-brand); margin: 0;">2/3</h2>
                    <small>MEALS COMPLETED</small>
                </div>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <div class="card" style="margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; padding: 20px 30px;">
                <div>
                    <h4 style="margin: 0;">Breakfast: Avocado Toast</h4>
                    <small style="color: var(--mint-brand); font-weight: 800;">COMPLETED</small>
                </div>
                <i class="fa-solid fa-circle-check" style="color: var(--mint-brand); font-size: 1.5rem;"></i>
            </div>
            
            <div class="card" style="margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; padding: 20px 30px;">
                <div>
                    <h4 style="margin: 0;">Lunch: Chicken Adobo</h4>
                    <small style="color: var(--pink-brand); font-weight: 800;">UP NEXT</small>
                </div>
                <i class="fa-regular fa-circle" style="color: #ccc; font-size: 1.5rem;"></i>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>
</html>
