<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | UlamFinder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column;">
    <div class="card" style="width: 100%; max-width: 400px; text-align: center;">
        <h1 style="font-family: 'Playfair Display';">Welcome Back</h1>
        <input type="email" placeholder="Email" style="width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #eee;">
        <input type="password" placeholder="Password" style="width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #eee;">
        <button class="btn-main" style="width: 100%; margin-top: 20px;" onclick="location.href='index.html'">Login</button>
        <p style="font-size: 0.8rem; margin-top: 20px;">Don't have an account? <span style="color: var(--pink-brand); font-weight: 800; cursor: pointer;">Sign Up</span></p>
    </div>
    <a href="index.html" style="margin-top: 20px; color: #888; text-decoration: none;">Back to Home</a>
</body>
</html>
