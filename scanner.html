<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scanner | UlamFinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #000; color: white;">
    <header class="subpage-header">
        <a href="index.html" class="back-link" style="background: rgba(255,255,255,0.1); border: none; color: white;">
            <i class="fa-solid fa-xmark"></i> Close Scanner
        </a>
    </header>

    <div style="position: relative; width: 85%; max-width: 400px; margin: 0 auto; height: 60vh; border: 2px solid var(--mint-brand); border-radius: 40px; overflow: hidden;">
        <video id="cam" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--mint-brand); box-shadow: 0 0 15px var(--mint-brand); animation: scanLine 3s infinite;"></div>
    </div>

    <div style="text-align: center; padding: 40px;">
        <h2 style="font-family: 'Playfair Display';">Scanning for QR...</h2>
        <p style="opacity: 0.6;">Align code within the frame</p>
    </div>

    <script>
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(s => document.getElementById('cam').srcObject = s);
    </script>
    <style>@keyframes scanLine { 0% { top: 0; } 100% { top: 100%; } }</style>
</body>
</html>
