<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | UlamFinder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column;">
    <div class="container" style="max-width: 400px; text-align: center;">
        <h1 class="logo" style="display: block; margin-bottom: 20px;">UlamFinder</h1>
        <h3>Welcome Back!</h3>
        <form style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <input type="email" placeholder="Email Address" style="padding: 15px; border-radius: 12px; border: 1px solid #ddd;">
            <input type="password" placeholder="Password" style="padding: 15px; border-radius: 12px; border: 1px solid #ddd;">
            <button class="btn" type="button" onclick="window.location.href='index.html'">LOGIN</button>
        </form>
        <p style="font-size: 0.8rem; margin-top: 20px; color: #888;">Don't have an account? <a href="#" style="color: var(--pink-accent);">Sign Up</a></p>
    </div>
</body>
</html>
