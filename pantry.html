<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Pantry | UlamFinder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="photo-header" style="background-image: url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?q=80&w=1600&auto=format&fit=crop');">
        <a href="index.html" class="btn-glass"><i class="fa-solid fa-house"></i> Home Dashboard</a>
    </header>

    <div class="container" style="max-width: 900px; margin: 0 auto; z-index: 10; position: relative;">
        <h1 style="font-family: 'Playfair Display'; font-size: 3.5rem;">My <span>Pantry</span></h1>
        
        <div class="features">
            <div class="premium-card"><h3>Fresh Eggs</h3><p>Quantity: 12 pcs</p><small style="color:var(--mint-brand); background: var(--mint-light); padding: 5px 10px; border-radius: 20px; font-weight: 800;">In Stock</small></div>
            <div class="premium-card"><h3>Garlic Rice</h3><p>Quantity: 500g</p><small style="color:var(--pink-brand); background: var(--pink-light); padding: 5px 10px; border-radius: 20px; font-weight: 800;">Low Stock</small></div>
            <div class="premium-card"><h3>Soy Sauce</h3><p>Quantity: 1 Liter</p><small style="color:var(--mint-brand); background: var(--mint-light); padding: 5px 10px; border-radius: 20px; font-weight: 800;">In Stock</small></div>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
