<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magic Suggestions | UlamFinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>

    <header class="subpage-header">
        <a href="index.html" class="back-link"><i class="fa-solid fa-house"></i> Dashboard</a>
    </header>

    <div class="container" style="max-width: 1000px;">
        <div style="text-align: center; margin-bottom: 50px;" data-aos="zoom-in">
            <i class="fa-solid fa-wand-sparkles" style="font-size: 3rem; color: var(--pink-brand); margin-bottom: 20px;"></i>
            <h1 style="font-family: 'Playfair Display'; font-size: 3rem;">Magic <span>Suggestions</span></h1>
            <p>AI-generated recipes based on your current pantry stock.</p>
        </div>

        <div class="features">
            <div class="card" data-aos="fade-up">
                <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=500" style="width: 100%; height: 150px; object-fit: cover; border-radius: 20px; margin-bottom: 20px;">
                <span style="color: var(--mint-brand); font-weight: 800; font-size: 0.7rem;">READY IN 20 MINS</span>
                <h3>Healthy Salad Bowl</h3>
                <p>Uses: Spinach, Eggs, and Garlic from your pantry.</p>
                <button class="btn-main" style="padding: 10px 20px; font-size: 0.8rem; margin-top: 15px;">View Recipe</button>
            </div>

            <div class="card" data-aos="fade-up" data-aos-delay="100">
                <img src="https://images.unsplash.com/photo-1512058560366-c80b042639f4?auto=format&fit=crop&q=80&w=500" style="width: 100%; height: 150px; object-fit: cover; border-radius: 20px; margin-bottom: 20px;">
                <span style="color: var(--pink-brand); font-weight: 800; font-size: 0.7rem;">PANTRY FAVORITE</span>
                <h3>Garlic Fried Rice</h3>
                <p>Uses: Rice, Garlic, and Soy Sauce from your stock.</p>
                <button class="btn-main" style="padding: 10px 20px; font-size: 0.8rem; margin-top: 15px;">View Recipe</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000 });</script>
</body>
</html>
