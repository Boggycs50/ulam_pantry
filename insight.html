<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights | UlamFinder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-mint: #5bc9b1;
            --primary-pink: #f4a2b9;
            --dark-text: #3d1c1c;
            --bg-color: #fff9f9;
            --white: #ffffff;
            --light-gray: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--dark-text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 450px;
            background: var(--white);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.04);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 700;
        }

        /* Total Display Card */
        .total-card {
            background: linear-gradient(135deg, var(--primary-mint), #4eb09b);
            color: white;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(91, 201, 177, 0.2);
        }

        .total-card small {
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.7rem;
        }

        .total-card h2 {
            font-size: 2.5rem;
            margin: 5px 0 0;
        }

        /* Input Section */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #eee;
            border-radius: 15px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary-pink); }

        .add-btn {
            background: var(--dark-text);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        /* History List */
        .history-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        #historyList {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.95rem;
        }

        .history-item span:last-child {
            font-weight: 700;
            color: var(--primary-mint);
        }

        .clear-btn {
            background: none;
            border: none;
            color: var(--primary-pink);
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>Spending <span>Insights</span></h1>
    </div>

    <div class="total-card">
        <small>Total Grocery Spend</small>
        <h2 id="total">₱0</h2>
    </div>

    <div class="input-group">
        <input type="number" id="amount" placeholder="0.00">
        <button class="add-btn" onclick="addCost()">Add</button>
    </div>

    <div class="history-title">
        Recent Expenses
        <button class="clear-btn" onclick="clearHistory()">Clear All</button>
    </div>
    
    <ul id="historyList"></ul>
</div>

<script>
    let costs = JSON.parse(localStorage.getItem("costs")) || [];

    function addCost() {
        let input = document.getElementById("amount");
        let amount = Number(input.value);

        if (amount > 0) {
            costs.push({
                amount: amount,
                date: new Date().toLocaleDateString()
            });
            localStorage.setItem("costs", JSON.stringify(costs));
            input.value = "";
            update();
        }
    }

    function clearHistory() {
        if(confirm("Are you sure you want to clear your history?")) {
            costs = [];
            localStorage.setItem("costs", JSON.stringify(costs));
            update();
        }
    }

    function update() {
        let total = costs.reduce((a, b) => a + b.amount, 0);
        document.getElementById("total").innerText = "₱" + total.toLocaleString();

        let list = document.getElementById("historyList");
        list.innerHTML = "";

        // Show latest items first
        [...costs].reverse().forEach(item => {
            let li = document.createElement("li");
            li.className = "history-item";
            li.innerHTML = `
                <span>${item.date}</span>
                <span>+ ₱${item.amount.toLocaleString()}</span>
            `;
            list.appendChild(li);
        });
    }

    update();
</script>

</body>
</html>
