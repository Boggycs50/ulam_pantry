<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Scanner | UlamFinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #111; color: white; }
        .scanner-window { 
            width: 90%; max-width: 400px; height: 500px; margin: 20px auto; 
            border: 3px solid var(--mint-complement); border-radius: 30px; 
            position: relative; overflow: hidden; background: #222;
        }
        .scan-line { width: 100%; height: 2px; background: var(--mint-complement); position: absolute; box-shadow: 0 0 15px var(--mint-complement); animation: scan 2s infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <div class="nav-header">
        <a href="index.html" class="back-link" style="background: rgba(255,255,255,0.1); color: white; border: none;">
            <i class="fa-solid fa-chevron-left"></i> Exit Scanner
        </a>
    </div>

    <div class="scanner-window">
        <div class="scan-line"></div>
        <div style="position: absolute; bottom: 20px; width: 100%; text-align: center; color: var(--mint-complement);">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Analyzing Ingredients...
        </div>
    </div>

    <div style="text-align: center; padding: 20px;">
        <h3>Point camera at your food</h3>
        <p style="opacity: 0.6;">UlamFinder AI is detecting items...</p>
    </div>
</body>
</html>
