<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insights | UlamFinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="nav-header"><a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Dashboard</a></div>
    <div class="container" style="max-width: 800px;">
        <h1>Monthly <span>Spending</span></h1>
        <div style="display: flex; align-items: flex-end; gap: 10px; height: 200px; border-bottom: 2px solid #eee; margin: 40px 0;">
            <div style="flex:1; background: var(--pink-light); height: 30%; border-radius: 10px 10px 0 0;"></div>
            <div style="flex:1; background: var(--pink-light); height: 50%; border-radius: 10px 10px 0 0;"></div>
            <div style="flex:1; background: var(--pink-accent); height: 80%; border-radius: 10px 10px 0 0;"></div>
            <div style="flex:1; background: var(--mint-complement); height: 45%; border-radius: 10px 10px 0 0;"></div>
        </div>
        <div style="background: white; border-radius: 20px; padding: 20px;">
            <h3><i class="fa-solid fa-wallet"></i> Recent History</h3>
            <p style="display: flex; justify-content: space-between;"><span>SM Supermarket</span> <b>₱1,200</b></p>
            <hr style="border: 0; border-top: 1px solid #eee;">
            <p style="display: flex; justify-content: space-between;"><span>Fresh Market</span> <b>₱450</b></p>
        </div>
    </div>
</body>
</html>
