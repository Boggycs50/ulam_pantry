<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Pantry | UlamFinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="nav-header">
        <a href="index.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> Dashboard</a>
    </div>

    <div class="container">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fa-solid fa-box-archive" style="font-size: 3rem; color: var(--mint-complement);"></i>
            <h1 style="font-family: 'Playfair Display';">Pantry <span>Inventory</span></h1>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 30px;">
            <input type="text" placeholder="Add new item..." style="flex: 1; padding: 15px; border-radius: 15px; border: 1px solid var(--pink-light); outline: none;">
            <button class="btn" style="padding: 10px 25px;">Add Item</button>
        </div>

        <div id="pantryList">
            <div style="display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #f0f0f0;">
                <span><i class="fa-solid fa-egg" style="color: #F7DC6F;"></i> &nbsp; Fresh Eggs (12 pcs)</span>
                <button style="border:none; background:none; color:#ff6b6b; cursor:pointer;"><i class="fa-solid fa-trash"></i></button>
            </div>
            <div style="display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #f0f0f0;">
                <span><i class="fa-solid fa-bowl-rice" style="color: #AED6F1;"></i> &nbsp; Jasmine Rice (5kg)</span>
                <button style="border:none; background:none; color:#ff6b6b; cursor:pointer;"><i class="fa-solid fa-trash"></i></button>
            </div>
            <div style="display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #f0f0f0;">
                <span><i class="fa-solid fa-drumstick-bite" style="color: var(--pink-accent);"></i> &nbsp; Chicken Breast (1kg)</span>
                <button style="border:none; background:none; color:#ff6b6b; cursor:pointer;"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
    </div>
</body>
</html>
