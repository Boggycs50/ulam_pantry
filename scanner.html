<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scanner | UlamFinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: #000; color: white;">

    <div class="nav-header">
        <a href="index.html" class="back-link" style="background: rgba(255,255,255,0.1); color: white; border: none;">
            <i class="fa-solid fa-arrow-left"></i> Exit Scanner
        </a>
    </div>

    <div style="position: relative; width: 90%; max-width: 400px; margin: 0 auto; border-radius: 30px; overflow: hidden; height: 60vh; border: 2px solid var(--mint-complement);">
        <video id="webcam" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--mint-complement); box-shadow: 0 0 15px var(--mint-complement); animation: scanLine 3s infinite;"></div>
    </div>

    <div style="text-align: center; padding: 30px;">
        <i class="fa-solid fa-barcode" style="font-size: 2rem; color: var(--mint-complement); margin-bottom: 10px;"></i>
        <h2>AI Scanning Active</h2>
        <p style="opacity: 0.7;">Point at ingredients to log them.</p>
    </div>

    <script>
        const video = document.getElementById('webcam');

        // This line requests the BACK camera (environment)
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: { exact: "environment" } } 
        })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            // Fallback if 'exact environment' fails (like on a PC)
            navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; });
        });
    </script>
</body>
</html>
