<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scanner | UlamFinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .viewfinder { 
            width: 100%; max-width: 400px; height: 500px; margin: 40px auto; 
            border: 4px solid var(--mint-complement); border-radius: 40px; 
            position: relative; overflow: hidden;
            background: url('https://images.unsplash.com/photo-1583258292688-d0213dc5a3a8?auto=format&fit=crop&q=80&w=500') center/cover;
        }
        .laser { width: 100%; height: 3px; background: var(--mint-complement); position: absolute; box-shadow: 0 0 15px var(--mint-complement); animation: moveScan 3s infinite; }
    </style>
</head>
<body>
    <div class="nav-header"><a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Home</a></div>
    <div class="viewfinder"><div class="laser"></div></div>
    <div style="text-align: center;">
        <h2>Analyzing <span>Groceries...</span></h2>
        <p><i class="fa-solid fa-circle-notch fa-spin"></i> Found: Chicken, Garlic, Soy Sauce</p>
    </div>
</body>
</html>
