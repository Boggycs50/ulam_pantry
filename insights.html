<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insights | UlamFinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        .bar { width: 40px; background: var(--mint-brand); border-radius: 10px 10px 0 0; transition: 1s ease-out; }
        .bar:nth-child(even) { background: var(--pink-brand); }
    </style>
</head>
<body>

    <header class="subpage-header">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Exit Insights</a>
    </header>

    <div class="container" style="max-width: 900px;" data-aos="fade-up">
        <h1 style="font-family: 'Playfair Display'; font-size: 3rem;">Spending <span>Insights</span></h1>
        <p style="margin-bottom: 40px;">Visualizing your grocery habits for March 2026.</p>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px;">
            <div class="card" style="padding: 20px; border-bottom: 5px solid var(--pink-brand);">
                <small>TOTAL SPENT</small>
                <h2>₱8,240.50</h2>
            </div>
            <div class="card" style="padding: 20px; border-bottom: 5px solid var(--mint-brand);">
                <small>POTENTIAL SAVINGS</small>
                <h2>₱1,400.00</h2>
            </div>
        </div>

        <div class="card" style="padding: 40px;">
            <h3>Weekly Expenditure</h3>
            <div style="display: flex; align-items: flex-end; justify-content: space-around; height: 200px; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 30px;">
                <div class="bar" style="height: 40%;"></div>
                <div class="bar" style="height: 85%;"></div>
                <div class="bar" style="height: 60%;"></div>
                <div class="bar" style="height: 30%;"></div>
                <div class="bar" style="height: 95%;"></div>
            </div>
            <div style="display: flex; justify-content: space-around; margin-top: 10px; color: #aaa; font-size: 0.8rem; font-weight: bold;">
                <span>WK 1</span><span>WK 2</span><span>WK 3</span><span>WK 4</span><span>WK 5</span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>
</html>
