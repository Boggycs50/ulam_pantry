<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Planner | UlamFinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="subpage-header">
        <a href="index.html" class="back-link"><i class="fa-solid fa-calendar-week"></i> My Schedule</a>
    </header>

    <div class="container">
        <h1 style="font-family: 'Playfair Display'; text-align: center; margin-bottom: 40px;">Weekly <span>Schedule</span></h1>
        
        <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; overflow-x: auto; padding-bottom: 20px;">
            <script>
                const days = ['MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN'];
                const meals = ['Beef Tapa', 'Sinigang', 'Pasta', 'Salad', 'Adobo', 'Steak', 'Fish'];
                
                days.forEach((day, i) => {
                    document.write(`
                        <div class="card" style="padding: 15px; min-width: 140px; text-align: center;">
                            <strong style="color: var(--pink-brand);">${day}</strong>
                            <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
                            <p style="font-size: 0.8rem; font-weight: 700;">${meals[i]}</p>
                            <div style="width: 100%; height: 5px; background: ${i%2==0 ? 'var(--mint-brand)' : '#eee'}; border-radius: 5px; margin-top: 10px;"></div>
                        </div>
                    `);
                });
            </script>
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="startplan.html" class="btn-main">Edit This Week</a>
        </div>
    </div>
</body>
</html>
